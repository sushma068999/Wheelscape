<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">     <!--imp for mobile responsiveness-->
    <title> Wheelscape </title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Dancing+Script:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- <header>   header is generally used for nav bar, and section for hero
        <nav>
            <a href=""></a>
        </nav>
    </header> -->
    
    <div class="hero"> <!--(div) container used to group and organize parts of a webpage-->

        <div class="wheel"> <!--(class) name that can be shared by many elements so they can look or behave the same-->

            <svg class="constellation" viewBox="0 0 1100 1100">

                <defs>
                    <!-- End arrow -->
                    <marker
                        id="arrow-end"
                        markerWidth="10"
                        markerHeight="10"
                        refX="8"
                        refY="3"
                        orient="auto"
                        markerUnits="strokeWidth">

                        <path
                        d="M0,0 L0,6 L9,3 Z"
                        fill="rgba(255,255,255,.6)" />
                    </marker>

                    <!-- Start arrow -->
                    <marker
                        id="arrow-start"
                        markerWidth="10"
                        markerHeight="10"
                        refX="2"
                        refY="3"
                        orient="auto"
                        markerUnits="strokeWidth">

                        <path
                        d="M9,0 L9,6 L0,3 Z"
                        fill="rgba(255,255,255,.6)" />
                    </marker>
                </defs>

                <line 
                    x1="550" 
                    y1="70" 
                    x2="550" 
                    y2="1080"
                    marker-start="url(#arrow-start)"
                    marker-end="url(#arrow-end)"/>
                <line 
                    x1="1010"
                    y1="320" 
                    x2="90" 
                    y2="780"
                    marker-start="url(#arrow-start)"
                    marker-end="url(#arrow-end)"/>
                <line 
                    x1="1010" 
                    y1="780" 
                    x2="90" 
                    y2="320"
                    marker-start="url(#arrow-start)"
                    marker-end="url(#arrow-end)"/>
            </svg>

            <span class="spinning icon1">
                <img src="icons/moon_icon.png" alt="Moon">
            </span> <!--wraps "special word" so you can style or target it without affecting the rest of the paragraph-->
            <span class="spinning icon2">
                <img src="icons/balance_icon.png" alt="Equality">
            </span>
            <span class="spinning icon3">
                <img src="icons/hourglass_icon.png" alt="Time">
            </span>
            <span class="spinning icon4">
                <img src="icons/mirror_icon.png" alt="Direction">
            </span>
            <span class="spinning icon5">
                <img src="icons/cards_icon.png" alt="Luck">
            </span>
            <span class="spinning icon6">
                <img src="icons/key_icon.png" alt="Possibility">
            </span>
        </div>
        <h1> Wheelscape </h1>
        <p>A world where every choice leads somewhere.</p>
        <br>
        <button id="open-pop-up"> Create + </button> <!--unique name given to one specific element-->
        <br>
        <button id="buttons"> My Wheels </button>
        <hr>
    </div>

    <section class="premadeWheels">
        <h2> My Wheels </h2>
        <div class="card">
            <p>Your world is empty.</p>
            <p>Create your first wheel and begin exploring.</p>
        </div>
    </section>

    <div class="pop-up" id="pop-up-id">
        <h2>Create Wheel</h2>
        <p>Name your wheel, add your options, and let fate decide.</p>
        <input type="text" placeholder="enter wheel name">
        <div class="options">
            <input type="text" placeholder="enter options">
            <button class="add-btn">+</button>
        </div>
        <p>(no options yet)</p>

        <div class="pop-up-actions">
            <button class="cancel-btn" id="close-pop-up">Cancel</button>
            <button class="create-btn">Create</button>
        </div>
        
    </div>
    <script src="index.js"></script>
</body>
</html>
